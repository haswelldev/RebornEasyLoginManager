name: Deploy Website

# Builds the static site in site/ and deploys it to GitHub Pages using the
# official Pages actions (no separate branch). Runs when the site changes, and
# whenever a release is published so the "latest release" label stays current.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write   # delete stale artifacts so re-runs don't duplicate "github-pages"
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest release tag
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --repo "${{ github.repository }}" --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then TAG="latest"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: Inject latest version into the page
        run: sed -i "s/{{VERSION}}/${{ steps.rel.outputs.tag }}/g" site/index.html

      # On a re-run, upload-artifact@v4 keeps the previous attempt's artifact and
      # adds another, so deploy-pages sees two "github-pages" and fails. Clear any
      # existing one from this run first so the upload below is the only match.
      - name: Remove stale Pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ids=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
                --jq '.artifacts[] | select(.name=="github-pages") | .id')
          for id in $ids; do
            echo "Deleting stale github-pages artifact $id"
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" || true
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
